<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLPI Control Center</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/search.css" />

<link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">🖥️</div>
      <h2>GLPI Control Center</h2>
      <p>Entre com suas credenciais para acessar</p>

      <input class="login-input" type="text"     id="login-user" placeholder="Usuário" />
      <input class="login-input" type="password" id="login-pass" placeholder="Senha"   />

      <button class="login-btn" id="login-btn">Entrar</button>
      <p class="login-error" id="login-error">Usuário ou senha incorretos</p>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <div class="topbar">
      <a class="topbar-logo" href="#">
        <span>🖥️</span>
        GLPI Control Center
      </a>

      <div class="topbar-right">
        <span id="glpi-status" class="glpi-status" style="font-size:13px;color:var(--green)">
          ● Conectado ao GLPI
        </span>
        <div class="avatar" id="user-avatar">A</div>
        <button class="logout-btn" id="logout-btn">Sair</button>
      </div>
    </div>

    <div class="tabs-bar"  id="tabs-bar"></div>
    <div class="content"   id="main-content"></div>
  </div>

  <div id="computer-details-modal" class="computer-modal" style="display:none;">
    <div class="computer-modal-backdrop" data-computer-modal-close="backdrop"></div>
    <div class="computer-modal-dialog">
      <div id="computer-details-modal-content"></div>
    </div>
  </div>

  <!-- SCRIPTS (ordem importa) -->
<script src="javascript/data.js"></script>
<script src="javascript/state.js"></script>
<script src="javascript/auth.js"></script>
<script src="javascript/glpi.client.js"></script>
<script src="javascript/ui_render.js"></script>
<script src="javascript/tickets.js"></script>
<script src="javascript/chat.js"></script>
<script src="javascript/app.js"></script>
<!-- MODAL DE CHAMADO -->
<div id="ticket-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999;align-items:center;justify-content:center;">
  <div style="background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:32px;width:100%;max-width:480px;">
    <h3 style="margin:0 0 4px;font-size:16px;">🎫 Abrir chamado</h3>
    <p id="modal-asset-name" style="margin:0 0 20px;font-size:13px;opacity:0.6;"></p>

    <input id="ticket-title"
      placeholder="Título do chamado"
      style="width:100%;margin-bottom:12px;padding:10px;border-radius:8px;border:1px solid var(--b);background:var(--bg);color:var(--p);font-size:14px;box-sizing:border-box;" />

    <textarea id="ticket-desc"
      placeholder="Descrição detalhada"
      style="width:100%;height:100px;margin-bottom:12px;padding:10px;border-radius:8px;border:1px solid var(--b);background:var(--bg);color:var(--p);font-size:14px;box-sizing:border-box;resize:vertical;"></textarea>

    <select id="ticket-priority"
      style="width:100%;margin-bottom:12px;padding:10px;border-radius:8px;border:1px solid var(--b);background:var(--bg);color:var(--p);font-size:14px;box-sizing:border-box;">
      <option value="1">▽ Muito baixa</option>
      <option value="2">▽ Baixa</option>
      <option value="3" selected>— Média</option>
      <option value="4">△ Alta</option>
      <option value="5">△△ Muito alta</option>
    </select>

    <input id="ticket-category"
      type="number"
      placeholder="ID da categoria (opcional)"
      style="width:100%;margin-bottom:20px;padding:10px;border-radius:8px;border:1px solid var(--b);background:var(--bg);color:var(--p);font-size:14px;box-sizing:border-box;" />

    <div style="display:flex;gap:12px;">
      <button onclick="window.Tickets.send()"
        style="flex:1;padding:10px;border-radius:8px;border:none;background:#4ade80;color:#000;font-size:14px;font-weight:600;cursor:pointer;">
        Salvar no GLPI
      </button>
      <button onclick="window.Tickets.closeModal()"
        style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--b);background:transparent;color:var(--p);font-size:14px;cursor:pointer;">
        Cancelar
      </button>
    </div>

    <p id="ticket-feedback" style="margin:12px 0 0;font-size:13px;text-align:center;display:none;"></p>
  </div>
</div>

<!-- MODAL / PAINEL DO CHAT -->
<div id="chat-panel" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:998;align-items:center;justify-content:center;">
  <div style="background:var(--surface,#1a1d27);border:1px solid var(--border,#2e3347);border-radius:16px;padding:0;width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;">

    <!-- Header -->
    <div style="padding:18px 24px;border-bottom:1px solid var(--border,#2e3347);display:flex;align-items:center;justify-content:space-between;">
      <div>
        <p style="margin:0;font-size:15px;font-weight:600;color:var(--text,#e8eaf6)">🤖 Assistente de Horários</p>
        <p style="margin:0;font-size:12px;color:var(--text2,#9299b8)">Carrinhos de Chromebooks — Colégio Satélite</p>
      </div>
      <button onclick="window.Chat.closePanel()" style="background:none;border:none;color:var(--text2,#9299b8);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px;">✕</button>
    </div>

    <!-- Mensagens -->
    <div id="chat-messages" style="flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:12px;min-height:200px;max-height:400px;">
      <div style="text-align:center;color:var(--text2,#9299b8);font-size:13px;padding:20px 0;">
        Olá! Pergunte sobre os horários dos carrinhos de Chromebooks. 👋
      </div>
    </div>

    <!-- Input -->
    <div style="padding:16px 24px;border-top:1px solid var(--border,#2e3347);display:flex;gap:10px;">
      <input
        id="chat-input"
        type="text"
        placeholder="Ex: Qual carrinho usa o 6º ano A?"
        style="flex:1;padding:10px 14px;background:var(--bg,#0f1117);border:1.5px solid var(--border,#2e3347);border-radius:8px;color:var(--text,#e8eaf6);font-size:14px;font-family:inherit;outline:none;"
        onkeydown="if(event.key==='Enter') window.Chat.send()"
      />
      <button
        onclick="window.Chat.send()"
        style="padding:10px 18px;background:var(--accent,#4f7ef7);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">
        Enviar
      </button>
    </div>

  </div>
</div>
</body>
</html>
